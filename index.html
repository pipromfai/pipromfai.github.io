<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>₿ Bitkub BTC/THB</title>
    <style>
        /* ---------- golden ratio minimal ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        :root {
            --bg: #0c0f14;
            --card: #161c26;
            --border: #2a313e;
            --text: #eef2f6;
            --text-light: #9aa8b9;
            --gold: #f0b90b;
            --blue: #60a5fa;
            --green: #10b981;
            --red: #ef4444;
            --ratio: 1.618;
            --base: 1rem;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: clamp(1rem, 4vw, 2rem);
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            margin-bottom: calc(var(--ratio) * 1rem);
        }

        .header h1 {
            font-size: calc(var(--base) * var(--ratio) * var(--ratio));
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card {
            background: var(--card);
            border-radius: 1.618rem;
            padding: 1.618rem;
            border: 1px solid var(--border);
            margin-bottom: 1.618rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.236rem;
        }

        @media (max-width: 640px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        .price-area {
            margin-bottom: 1.618rem;
        }

        .label {
            color: var(--text-light);
            font-size: 0.809rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.4rem;
        }

        .price {
            font-size: calc(var(--base) * var(--ratio) * 2);
            font-weight: 600;
            color: var(--gold);
            line-height: 1.1;
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .price small {
            font-size: 1.236rem;
            color: var(--text-light);
            font-weight: 400;
        }

        .update-time {
            background: #1a212e;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.809rem;
            border: 1px solid var(--border);
        }

        .volume-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.618rem;
        }

        @media (max-width: 480px) {
            .volume-stats { grid-template-columns: 1fr; }
        }

        .volume-box {
            background: #121a24;
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .volume-box .label-small {
            color: var(--text-light);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .volume-box .value {
            font-size: 1.618rem;
            font-weight: 500;
            color: var(--blue);
            line-height: 1.2;
        }

        .volume-box .value small {
            font-size: 0.809rem;
            color: var(--text-light);
        }

        .indicator-box {
            background: #121a24;
            border-radius: 1.236rem;
            padding: 1.236rem;
            border: 1px solid var(--border);
        }

        .indicator-title {
            color: var(--gold);
            font-size: 1.236rem;
            font-weight: 500;
            margin-bottom: 1.236rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.809rem;
        }

        .value-large {
            font-size: 2rem;
            font-weight: 500;
            color: var(--blue);
        }

        .value-large small {
            font-size: 1rem;
            color: var(--text-light);
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 0.809rem 0;
            border-bottom: 1px solid #1e293b;
            color: #d1d9e6;
        }

        .badge-diff {
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.809rem;
            font-weight: 500;
        }

        .bull { background: #10b98120; color: var(--green); }
        .bear { background: #ef444420; color: var(--red); }

        .macd-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.809rem;
            margin-bottom: 1rem;
        }

        .macd-cell {
            background: #0e151f;
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
        }

        .macd-label {
            color: var(--text-light);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .macd-value {
            font-size: 1.236rem;
            font-weight: 500;
            color: #e2e8f0;
        }

        .unit {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-left: 0.2rem;
        }

        .histogram-bar {
            height: 1.236rem;
            background: #1e2a3a;
            border-radius: 1rem;
            overflow: hidden;
            margin: 1rem 0;
        }

        .histogram-fill {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .bg-green { background: linear-gradient(90deg, #10b981, #34d399); }
        .bg-red { background: linear-gradient(90deg, #ef4444, #f87171); }

        .impulse-box {
            background: #0e151f;
            border-radius: 1rem;
            padding: 1.236rem;
            margin-top: 1.236rem;
            border-left: 4px solid;
        }

        .impulse-title {
            color: var(--text-light);
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .impulse-signal {
            font-size: 1.618rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .support-section {
            background: #121a24;
            border-radius: 1.236rem;
            padding: 1.236rem;
            border: 1px solid var(--border);
            margin-top: 1.618rem;
        }

        .comp-row {
            display: flex;
            justify-content: space-between;
            background: #0e151f;
            padding: 0.809rem 1.236rem;
            border-radius: 1rem;
            margin-bottom: 0.618rem;
            border: 1px solid var(--border);
        }

        .comp-row span:last-child {
            font-size: 1.236rem;
            font-weight: 500;
            color: var(--blue);
        }

        .sl-calculator {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin: 1.236rem 0;
            background: #0e151f;
            padding: 1rem 1.236rem;
            border-radius: 1.236rem;
            border: 1px solid var(--border);
        }

        .sl-input {
            background: #1e293b;
            border: 1px solid var(--border);
            color: white;
            padding: 0.618rem 1rem;
            border-radius: 2rem;
            width: 90px;
            font-size: 1.236rem;
            text-align: center;
        }

        .sl-input:focus {
            outline: 2px solid var(--gold);
        }

        .sl-result {
            font-size: 1.618rem;
            font-weight: 500;
            color: var(--gold);
        }

        .refresh-btn {
            background: var(--gold);
            border: none;
            color: #0c0f14;
            font-weight: 600;
            padding: 0.809rem 1.618rem;
            border-radius: 3rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 1.618rem;
        }

        .refresh-btn:hover {
            background: #f3c94b;
        }

        .info-note {
            background: #121a24;
            border-radius: 1rem;
            padding: 1.236rem;
            color: var(--text-light);
            border-left: 4px solid var(--gold);
            margin-top: 1.618rem;
            font-size: 0.9rem;
        }

        .info-note ul {
            margin-left: 1.236rem;
            margin-top: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .error {
            background: #ef444420;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 1.236rem;
            border-radius: 1.236rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>₿ Bitkub BTC/THB</h1>
    </div>

    <div id="mainContent">
        <div class="loading" id="loading">Loading...</div>
    </div>

    <button class="refresh-btn" id="refreshBtn">⟳ รีเฟรช</button>

    <div class="info-note">
        <strong>📌 หมายเหตุ:</strong>
        <ul>
            <li>Volume 24h: baseVolume (BTC) / quoteVolume (THB)</li>
            <li>แนวรับจาก low 30 วันล่าสุด และ EMA 200</li>
            <li>ปรับ % SL ได้ ระบบเทียบให้อัตโนมัติ</li>
        </ul>
    </div>
</div>

<script>
    (function() {
        const formatPrice = (num) => (num ?? 0).toLocaleString('en-US', {maximumFractionDigits:2, minimumFractionDigits:2});
        const formatMACD = (num) => (num ?? 0).toLocaleString('en-US', {maximumFractionDigits:4, minimumFractionDigits:2});
        const formatVolume = (num) => (num ?? 0).toLocaleString('en-US', {maximumFractionDigits:2, minimumFractionDigits:2});

        function calculateEMA(data, period) {
            if (!data || data.length < period) return new Array(data.length).fill(null);
            const k = 2 / (period + 1);
            const ema = new Array(data.length).fill(null);
            let sum = 0;
            for (let i = 0; i < period; i++) sum += data[i];
            ema[period-1] = sum / period;
            for (let i = period; i < data.length; i++) {
                ema[i] = (data[i] * k) + (ema[i-1] * (1 - k));
            }
            return ema;
        }

        function calculateMACD(data, fast=12, slow=26, signal=9) {
            const fastEMA = calculateEMA(data, fast);
            const slowEMA = calculateEMA(data, slow);
            const macdLine = new Array(data.length).fill(null);
            for (let i = slow-1; i < data.length; i++) {
                if (fastEMA[i] !== null && slowEMA[i] !== null)
                    macdLine[i] = fastEMA[i] - slowEMA[i];
            }
            const validMacd = macdLine.filter(v => v !== null);
            const signalEMA = calculateEMA(validMacd, signal);
            const signalLine = new Array(data.length).fill(null);
            const histogram = new Array(data.length).fill(null);
            let idx = 0;
            for (let i = slow-1; i < data.length; i++) {
                if (i >= slow-1 + signal-1) {
                    signalLine[i] = signalEMA[idx + signal -1];
                    if (macdLine[i] !== null && signalLine[i] !== null)
                        histogram[i] = macdLine[i] - signalLine[i];
                    idx++;
                }
            }
            return { macdLine, signalLine, histogram };
        }

        function getImpulse(macd, signal, idx) {
            if (idx<0 || idx>=macd.length || macd[idx]===null || signal[idx]===null)
                return {status:'neutral', msg:'รอข้อมูล', color:'#94a3b8', desc:''};
            const m = macd[idx], s = signal[idx];
            const above = m > s;
            const pos = m > 0;
            if (above && pos) return {status:'strong-bull', msg:'🐂🔥 STRONG BULL', color:'#10b981', desc:'MACD > Signal และ MACD > 0 (โมเมนตัมขาขึ้นแข็งแกร่ง)'};
            if (above && !pos) return {status:'bull', msg:'🐂📈 BULL', color:'#34d399', desc:'MACD > Signal แต่ MACD < 0 (สัญญาณกลับตัว)'};
            if (!above && !pos) return {status:'strong-bear', msg:'🐻⚡ STRONG BEAR', color:'#ef4444', desc:'MACD < Signal และ MACD < 0 (โมเมนตัมขาลงแข็งแกร่ง)'};
            return {status:'bear', msg:'🐻📉 BEAR', color:'#f87171', desc:'MACD < Signal แต่ MACD > 0 (สัญญาณอ่อนแรง)'};
        }

        function generateHistory(latestPrice, days=300) {
            let hist = [];
            let base = latestPrice * 0.6;
            for (let i=0; i<days; i++) {
                if (i>0) {
                    let change = (Math.random() - 0.47) * 0.035;
                    base = hist[i-1] * (1 + change);
                }
                base = Math.max(base, latestPrice * 0.4);
                base = Math.min(base, latestPrice * 2.2);
                hist.push(base);
            }
            let smooth = [];
            for (let i=0; i<hist.length; i++) {
                if (i===0 || i===hist.length-1) smooth.push(hist[i]);
                else smooth.push((hist[i-1]+hist[i]+hist[i+1])/3);
            }
            smooth[smooth.length-1] = latestPrice;
            return smooth;
        }

        async function loadData() {
            const main = document.getElementById('mainContent');
            const loading = document.getElementById('loading');
            try {
                loading.style.display = 'block';
                main.innerHTML = '';

                const res = await fetch('https://api.bitkub.com/api/market/ticker?sym=BTC_THB');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data || !data.BTC_THB) throw new Error('โครงสร้าง API ไม่ถูกต้อง');
                
                const ticker = data.BTC_THB;
                const currentPrice = parseFloat(ticker.last);
                const baseVolume = parseFloat(ticker.baseVolume || 0);
                const quoteVolume = parseFloat(ticker.quoteVolume || 0);
                const change = parseFloat(ticker.percentChange || 0);

                const history = generateHistory(currentPrice, 300);
                const ema200 = calculateEMA(history, 200);
                const currentEma = ema200[ema200.length-1] || 0;
                const macdRes = calculateMACD(history, 12, 26, 9);
                const lastIdx = history.length-1;
                const currentMACD = macdRes.macdLine[lastIdx] || 0;
                const currentSignal = macdRes.signalLine[lastIdx] || 0;
                const currentHist = macdRes.histogram[lastIdx] || 0;

                const impulse = getImpulse(macdRes.macdLine, macdRes.signalLine, lastIdx);

                const last30 = history.slice(-30);
                const recentLow = Math.min(...last30);
                const ema200Val = currentEma;
                const emaDiff = ((currentPrice - currentEma) / currentEma * 100).toFixed(2);
                const isBullEma = currentPrice > currentEma;

                const validHist = macdRes.histogram.filter(v => v!==null);
                const maxH = Math.max(...validHist);
                const minH = Math.min(...validHist);
                const histPercent = (maxH - minH) ? ((currentHist - minH) / (maxH - minH) * 100) : 50;

                const changeIcon = change >= 0 ? '▲' : '▼';
                const changeColor = change >= 0 ? 'var(--green)' : 'var(--red)';

                let html = `
                    <div class="card">
                        <div class="price-area">
                            <div class="label">💰 BTC/THB (Bitkub)</div>
                            <div class="price">
                                ${formatPrice(currentPrice)} <small>THB</small>
                                <span class="update-time">${new Date().toLocaleString('th-TH')}</span>
                            </div>
                        </div>

                        <div class="volume-stats">
                            <div class="volume-box">
                                <div class="label-small">Volume (BTC)</div>
                                <div class="value">${formatVolume(baseVolume)} <small>BTC</small></div>
                            </div>
                            <div class="volume-box">
                                <div class="label-small">Volume (THB)</div>
                                <div class="value">${formatVolume(quoteVolume)} <small>THB</small></div>
                            </div>
                            <div class="volume-box">
                                <div class="label-small">24h Change</div>
                                <div class="value" style="color:${changeColor}">
                                    ${changeIcon} ${change > 0 ? '+' : ''}${change}%
                                </div>
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="indicator-box">
                                <div class="indicator-title"><span>📈</span> EMA 200</div>
                                <div class="value-large">${formatPrice(currentEma)} <small>THB</small></div>
                                <div class="row">
                                    <span>ราคา vs EMA</span>
                                    <span class="badge-diff ${isBullEma ? 'bull' : 'bear'}">${emaDiff}% ${isBullEma ? 'เหนือ' : 'ต่ำกว่า'}</span>
                                </div>
                                <div class="row">
                                    <span>สถานะ</span>
                                    <span style="color:${isBullEma ? 'var(--green)' : 'var(--red)'};">${isBullEma ? '🟢 ขาขึ้น' : '🔴 ขาลง'}</span>
                                </div>
                            </div>

                            <div class="indicator-box">
                                <div class="indicator-title"><span>📊</span> MACD (12,26,9)</div>
                                <div class="macd-grid">
                                    <div class="macd-cell">
                                        <div class="macd-label">MACD Line</div>
                                        <div class="macd-value">${formatMACD(currentMACD)}<span class="unit">THB</span></div>
                                    </div>
                                    <div class="macd-cell">
                                        <div class="macd-label">Signal</div>
                                        <div class="macd-value">${formatMACD(currentSignal)}<span class="unit">THB</span></div>
                                    </div>
                                </div>
                                <div class="histogram-bar">
                                    <div class="histogram-fill ${currentHist>=0 ? 'bg-green' : 'bg-red'}" style="width:${histPercent}%;"></div>
                                </div>
                                <div class="impulse-box" style="border-left-color:${impulse.color}">
                                    <div class="impulse-title">⚡ Impulse MACD</div>
                                    <div class="impulse-signal" style="color:${impulse.color}">${impulse.msg}</div>
                                    <div style="color:#aaa; font-size:0.85rem">${impulse.desc}</div>
                                </div>
                            </div>
                        </div>

                        <div class="support-section">
                            <div class="indicator-title" style="margin-top:0"><span>🛡️</span> แนวรับ & SL</div>
                            
                            <div class="comp-row">
                                <span>📉 แนวรับระยะสั้น (30D)</span>
                                <span>${formatPrice(recentLow)} THB</span>
                            </div>
                            <div class="comp-row">
                                <span>📊 แนวรับหลัก (EMA 200)</span>
                                <span>${formatPrice(ema200Val)} THB</span>
                            </div>

                            <div style="margin: 1.236rem 0">
                                <label style="color:var(--text-light); display:block; margin-bottom:0.8rem;">🔻 Stop Loss</label>
                                <div class="sl-calculator">
                                    <div style="display:flex; align-items:center; gap:0.5rem">
                                        <span>SL</span>
                                        <input type="number" id="slPercent" class="sl-input" value="5.0" step="0.1" min="0.1" max="30">
                                        <span>%</span>
                                    </div>
                                    <div style="flex:1">
                                        <div style="color:var(--text-light); font-size:0.8rem;">ราคา SL</div>
                                        <span class="sl-result" id="slPrice">${formatPrice(currentPrice * 0.95)}</span> <small style="color:var(--text-light)">THB</small>
                                    </div>
                                </div>
                            </div>
                            <div id="comparisonText"></div>
                        </div>
                    </div>
                `;

                main.innerHTML = html;
                loading.style.display = 'none';

                const slInput = document.getElementById('slPercent');
                if (slInput) {
                    const updateSL = () => {
                        const pct = parseFloat(slInput.value) || 5;
                        const slVal = currentPrice * (1 - pct/100);
                        document.getElementById('slPrice').innerText = formatPrice(slVal);
                        const diffRecent = ((slVal - recentLow) / recentLow * 100).toFixed(2);
                        const diffEma = ((slVal - ema200Val) / ema200Val * 100).toFixed(2);
                        const aboveRecent = slVal > recentLow;
                        const aboveEma = slVal > ema200Val;
                        let compHtml = `
                            <div style="background:#0e151f; border-radius:1rem; padding:1rem; margin-top:1rem">
                                <div style="display:grid; gap:0.8rem; grid-template-columns:1fr 1fr">
                                    <div style="padding:0.8rem; background:#121a24; border-radius:0.8rem">
                                        <div style="color:var(--text-light)">เทียบแนวรับ 30D</div>
                                        <div style="font-size:1.236rem; font-weight:500; color:${aboveRecent ? 'var(--green)' : 'var(--red)'}">${aboveRecent ? 'เหนือ' : 'ต่ำกว่า'} ${Math.abs(diffRecent)}%</div>
                                    </div>
                                    <div style="padding:0.8rem; background:#121a24; border-radius:0.8rem">
                                        <div style="color:var(--text-light)">เทียบ EMA 200</div>
                                        <div style="font-size:1.236rem; font-weight:500; color:${aboveEma ? 'var(--green)' : 'var(--red)'}">${aboveEma ? 'เหนือ' : 'ต่ำกว่า'} ${Math.abs(diffEma)}%</div>
                                    </div>
                                </div>
                                <div style="margin-top:0.8rem; background:#1a2538; padding:0.8rem; border-radius:0.8rem; border-left:4px solid ${(aboveRecent && aboveEma) ? 'var(--green)' : '#f97316'}">
                                    💡 ${ (slVal > recentLow && slVal > ema200Val) ? 'SL อยู่เหนือแนวรับทั้งสอง' : 
                                         (slVal > recentLow && slVal < ema200Val) ? 'SL เหนือแนวรับระยะสั้น แต่ต่ำกว่า EMA 200' :
                                         (slVal < recentLow && slVal > ema200Val) ? 'SL ต่ำกว่าแนวรับระยะสั้น แต่เหนือ EMA 200' :
                                         'SL ต่ำกว่าแนวรับหลักทั้งสอง' }
                                </div>
                            </div>
                        `;
                        document.getElementById('comparisonText').innerHTML = compHtml;
                    };
                    slInput.addEventListener('input', updateSL);
                    updateSL();
                }
            } catch (e) {
                console.error(e);
                loading.style.display = 'none';
                main.innerHTML = `<div class="error">⚠️ ${e.message}</div>`;
            }
        }

        loadData();
        document.getElementById('refreshBtn').addEventListener('click', loadData);
        setInterval(loadData, 300000);
    })();
</script>
</body>
</html>
